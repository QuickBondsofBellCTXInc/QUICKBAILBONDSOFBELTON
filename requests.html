<h2>Submit a Service Request</h2>

<p>Use this form to request bond assistance or pre-trial release information. Our licensed agents will respond promptly.</p>

<form action="mailto:info@quickreleasebailbonds.com" method="post" enctype="text/plain">
<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<select name="serviceType" required>

<option value="pretrial">Pre-Trial Release</option>
<option value="rehab">Rehabilitation Placement</option>
<option value="casefile">Casefile Assistance</option>

</select>

</form>
